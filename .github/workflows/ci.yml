name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt numpy scikit-learn hdbscan pytest flake8

      - name: Lint
        run: |
          flake8 src/download_tiktok_videos.py src/format_urls.py
          flake8 src/ai/ src/enrich_videos.py src/search_videos.py src/cluster_videos.py src/app.py --max-line-length=100

      - name: Run unit tests
        run: pytest --maxfail=1 --disable-warnings -q